<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Light mode background: silver-gray -->
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d2d6dd"/>
      <stop offset="100%" stop-color="#b8bdc8"/>
    </linearGradient>
    <!-- Dark mode background: deep navy -->
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b38"/>
      <stop offset="100%" stop-color="#1a2b52"/>
    </linearGradient>
  </defs>

  <style>
    /* Light mode (default) */
    .bg        { fill: url(#bgLight); }
    .brand     { fill: #0d2f5e; }
    .brandline { stroke: #0d2f5e; fill: none; stroke-width: 10; stroke-linecap: round; }

    /* Dark mode — automatic on iOS/macOS/Chrome when system is dark */
    @media (prefers-color-scheme: dark) {
      .bg        { fill: url(#bgDark); }
      .brand     { fill: #c8d8f5; }
      .brandline { stroke: #c8d8f5; }
    }
  </style>

  <!-- Rounded-square background -->
  <rect class="bg" width="512" height="512" rx="112"/>

  <!-- Bar chart — 4 ascending bars -->
  <rect class="brand" x="130" y="278" width="52" height="82"  rx="9"/>
  <rect class="brand" x="196" y="240" width="52" height="120" rx="9"/>
  <rect class="brand" x="262" y="196" width="52" height="164" rx="9"/>
  <rect class="brand" x="328" y="142" width="52" height="218" rx="9"/>

  <!-- Plant stem rising from top of tallest bar -->
  <path class="brandline" d="M354,142 C354,114 340,96 324,72"/>

  <!-- Leaf -->
  <ellipse class="brand" cx="316" cy="74" rx="28" ry="13"
           transform="rotate(-42 316 74)"/>

  <!-- Tip/bud -->
  <circle class="brand" cx="324" cy="65" r="6"/>

  <!-- Logotype -->
  <text class="brand" x="256" y="432"
        font-family="'Arial Black','Arial Bold','Helvetica Neue',Helvetica,sans-serif"
        font-weight="900" font-size="50"
        text-anchor="middle" letter-spacing="4">FINANCIER</text>
</svg>
