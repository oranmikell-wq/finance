<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0d4db"/>
      <stop offset="100%" stop-color="#c0c4cc"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b38"/>
      <stop offset="100%" stop-color="#1a2b52"/>
    </linearGradient>
  </defs>

  <style>
    .bg        { fill: url(#bgLight); }
    .brand     { fill: #1a4f88; }
    .brandline { stroke: #1a4f88; fill: none; stroke-width: 8; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .bg        { fill: url(#bgDark); }
      .brand     { fill: #c8d8f5; }
      .brandline { stroke: #c8d8f5; }
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="512" height="512" rx="112"/>

  <!-- 5 ascending bars — bottom at y=342 -->
  <rect class="brand" x="152" y="290" width="36" height="52"  rx="6"/>
  <rect class="brand" x="195" y="264" width="36" height="78"  rx="6"/>
  <rect class="brand" x="238" y="234" width="36" height="108" rx="6"/>
  <rect class="brand" x="281" y="194" width="36" height="148" rx="6"/>
  <rect class="brand" x="324" y="150" width="36" height="192" rx="6"/>

  <!-- Diagonal stem: rises from top-centre of bar 5 to leaf base -->
  <line class="brandline" x1="342" y1="148" x2="290" y2="84"/>

  <!-- Leaf: pointed-oval, tip pointing upper-left.
       Path is defined pointing up; rotate(-45) tilts it to 10-o'clock. -->
  <path class="brand"
        d="M 0,-28 C 15,-14 15,8 0,20 C -15,8 -15,-14 0,-28 Z"
        transform="translate(280,66) rotate(-45)"/>

  <!-- FINANCIER -->
  <text class="brand" x="256" y="428"
        font-family="'Arial Black','Arial Bold','Helvetica Neue',Helvetica,sans-serif"
        font-weight="900" font-size="54"
        text-anchor="middle" letter-spacing="1">FINANCIER</text>
</svg>
